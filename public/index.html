<!doctype html>
<html lang="en">
<head>
  <!-- Basic Page Needs -->
  <meta charset="utf-8" />
  <title>READTalk Messenger</title>
  <meta name="description" content="" />
  <meta name="author" content="" />

  <!-- Mobile Specific Metas -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/normalize.css" />
  <link rel="stylesheet" href="css/skeleton.css" />
  <link rel="stylesheet" href="styles.css" />

  <!-- Favicon -->
  <link rel="icon" type="image/ico" href="favicon.ico" />

  <style>
    /* Layer 1 fullscreen overlay */
    #auth-layer {
      position: fixed;
      top:0; left:0; right:0; bottom:0;
      background-color: #fff;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 2em;
    }
    #auth-layer button {
      padding: 0.5em 1em;
      font-size: 1em;
      margin-top: 1em;
      cursor: pointer;
    }
    #auth-error {
      color: red;
      margin-top: 1em;
    }
  </style>
</head>
<body>
  <!-- Layer 1: Fetch OpenAuth Identity -->
  <div id="auth-layer">
    <h2>Loading your identity...</h2>
    <button id="auth-button">Login with OpenAuth</button>
    <p id="auth-error"></p>
  </div>

  <!-- Primary Page Layout -->
  <div class="container" style="width: 95%; height: 100%">
    <div class="row" style="height: 100%">
      <div class="one-third column" style="margin-top: 25%">
        <h4><b>READT</b>alk</h4>
        <p>sidebar area for Session ID account list auto by Email at here !</p>
      </div>
      <div class="two-thirds column" id="root"></div>
    </div>
  </div>

  <script type="module">
    const authLayer = document.getElementById('auth-layer');
    const authButton = document.getElementById('auth-button');
    const authError = document.getElementById('auth-error');

    const OPENAUTH_URL = "https://openauth.soeparnocorp.workers.dev/password/authorize";

    async function fetchIdentity() {
      try {
        const resp = await fetch(OPENAUTH_URL, {
          credentials: 'include'
        });
        if (!resp.ok) throw new Error("Failed to fetch identity");
        const data = await resp.json();
        // Assuming identity returns { id, email }
        if (!data.id) throw new Error("Identity missing ID");
        // Store identity in window for later chat layer
        window.userIdentity = data;
        // Hide auth layer
        authLayer.style.display = 'none';
        console.log("User identity loaded:", data);
        // Here you can trigger your ChatRoom init
      } catch (err) {
        console.error(err);
        authError.textContent = err.message;
      }
    }

    authButton.addEventListener('click', fetchIdentity);

    // Optional: auto fetch on load if cookies/session exist
    window.addEventListener('load', fetchIdentity);
  </script>
</body>
</html>
