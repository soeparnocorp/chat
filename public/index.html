<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>READTalk Messenger</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/normalize.css" />
  <link rel="stylesheet" href="css/skeleton.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/ico" href="favicon.ico" />
  <style>
    body, html { height: 100%; margin:0; font-family: Arial, Helvetica, sans-serif; }
    #layer-auth, #chatroom { position:absolute; top:0; left:0; right:0; bottom:0; }
    #layer-auth { display:flex; justify-content:center; align-items:center; background:#f5f5f5; flex-direction:column; }
    #chatroom { display:none; }
    #chatlog { position:absolute; top:0; left:0; right:200px; bottom:32px; overflow-y:auto; padding:8px; }
    #roster { position:absolute; top:0; right:0; bottom:32px; width:200px; padding:8px; font-weight:bold; border-left:none; }
    #chat-input { position:absolute; bottom:0; left:0; width:100%; height:32px; padding-left:32px; border:none; outline:none; }
    ::-webkit-scrollbar { display:none; }
    @media(max-width:600px) { #roster { display:none; } #chatlog { right:0; } }
  </style>
</head>
<body>
  <!-- Layer 1: Auth -->
  <div id="layer-auth">
    <h4>Checking your identity...</h4>
    <p>Please wait while we validate your session via OpenAuth.</p>
  </div>

  <!-- Layer 2: ChatRoom -->
  <div id="chatroom">
    <div id="chatlog"></div>
    <div id="roster"></div>
    <input id="chat-input" placeholder="Type a message..." />
  </div>

  <script type="module">
    const layerAuth = document.getElementById('layer-auth');
    const chatroom = document.getElementById('chatroom');
    const chatlog = document.getElementById('chatlog');
    const roster = document.getElementById('roster');
    const chatInput = document.getElementById('chat-input');

    let username, roomname;

    // Ambil identity dari query param ?user=ID (setelah OpenAuth callback)
    function getUserFromQuery() {
      const params = new URLSearchParams(location.search);
      return params.get('user') || null;
    }

    function redirectToAuth() {
      location.href = '/authorize';
    }

    function startChatRoom() {
      layerAuth.style.display = 'none';
      chatroom.style.display = 'block';
      chatInput.focus();

      roomname = location.hash.slice(1) || 'public';
      location.hash = roomname;

      const protocol = location.protocol === 'http:' ? 'ws:' : 'wss:';
      const ws = new WebSocket(`${protocol}//${location.host}/api/room/${roomname}/websocket`);

      ws.addEventListener('open', ()=> ws.send(JSON.stringify({name: username})));
      ws.addEventListener('message', e => {
        const msg = JSON.parse(e.data);
        if(msg.messages) {
          chatlog.innerHTML='';
          msg.messages.forEach(m=>addChatMessage(m.user, m.content));
        } else if(msg.name && msg.message) {
          addChatMessage(msg.name, msg.message);
        }
      });

      chatInput.addEventListener('keydown', e => {
        if(e.key==='Enter' && chatInput.value.trim()!=='') {
          ws.send(JSON.stringify({message: chatInput.value}));
          chatInput.value='';
        }
      });
    }

    function addChatMessage(user, text) {
      const p = document.createElement('p');
      p.innerHTML = `<b>${user}:</b> ${text}`;
      chatlog.appendChild(p);
      chatlog.scrollTop = chatlog.scrollHeight;
    }

    // MAIN FLOW
    username = getUserFromQuery();
    if(!username) {
      // Belum login → redirect ke OpenAuth /authorize
      redirectToAuth();
    } else {
      startChatRoom();
    }
  </script>
</body>
</html>
